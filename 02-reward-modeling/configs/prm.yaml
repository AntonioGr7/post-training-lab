# =============================================================================================
# Process Reward Model (PRM) — the advanced section. Step-level supervision on math reasoning.
# Token-classification model; small by design (step-level data is scarce/expensive).
# Comfortably fits a single A100/H100 (and even much smaller GPUs).
#
#   uv run python train_prm.py --config configs/prm.yaml
#   # quick smoke:
#   uv run python train_prm.py --config configs/prm.yaml --max_train_samples 256 --max_steps 5
#
# Parsed into LabArguments + PRMConfig + ModelConfig by TrlParser.
# =============================================================================================

# ---- ModelConfig ----------------------------------------------------------------------------
model_name_or_path: Qwen/Qwen3-0.6B-Base
dtype: bfloat16
attn_implementation: sdpa

# ---- LabArguments (dataset) -----------------------------------------------------------------
dataset_name: trl-lib/math_shepherd            # prompt + completions(list of steps) + labels(list)
dataset_train_split: train
max_train_samples: 20000

# ---- PRMConfig (training) -------------------------------------------------------------------
output_dir: outputs/qwen3-0.6b-prm-math-shepherd
max_length: 1024
step_separator: "\n"                           # MUST match what you use at inference time
train_on_last_step_only: false                 # supervise every step, not just the final one

num_train_epochs: 1
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
learning_rate: 1.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.03

bf16: true
gradient_checkpointing: true

logging_steps: 10
save_strategy: epoch
save_total_limit: 1
report_to: wandb
run_name: qwen3-0.6b-prm-math-shepherd
seed: 42
